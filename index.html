<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boda Valeria & Alan</title>

<link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'DejaVu Serif', serif;
color:#5C5148;
text-align:center;

background-image:url("fondo.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
background-repeat:no-repeat;
}

/* capa suave */
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
z-index:-1;
}

.portada{
height:100vh;
background:url("foto1.jpg") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
padding:20px;
}

.nombres{
font-family:'Parisienne', cursive;
font-size:72px;
letter-spacing:2px;
}

.fecha{
font-size:20px;
margin-top:10px;
}

.boton{
display:inline-block;
margin-top:20px;
padding:12px 26px;
background:rgba(0,0,0,0.7);
color:white;
text-decoration:none;
border-radius:25px;
font-size:14px;
cursor:pointer;
transition:.3s;
}

.boton:hover{
background:#3a3a3a;
transform:scale(1.05);
}

section{
padding:70px 20px;
}

.titulo{
font-family:'Parisienne', cursive;
font-size:38px;
margin-bottom:20px;
}

.tarjeta{
max-width:900px;
margin:auto;
padding:45px 30px;
border-radius:22px;
background:
linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
repeating-linear-gradient(
45deg,
rgba(0,0,0,0.015),
rgba(0,0,0,0.015) 2px,
transparent 2px,
transparent 6px
);
box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

.subtitulo{
font-weight:bold;
margin-top:20px;
}

.galeria{
display:flex;
overflow-x:auto;
gap:15px;
padding:20px;
}

.galeria img{
width:80%;
max-width:400px;
border-radius:18px;
flex-shrink:0;
}

.foto-romantica{
width:100%;
height:450px;
background-size:cover;
background-position:center;
border-radius:20px;
margin:40px auto;
max-width:900px;
}

#contador{
font-size:24px;
margin-top:10px;
}

/* animación */
.animar{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.animar.visible{
opacity:1;
transform:translateY(0);
}

@media(max-width:600px){

.nombres{font-size:48px;}
.titulo{font-size:28px;}
.foto-romantica{height:300px;}
.galeria img{width:85%;}
.tarjeta{padding:35px 22px;}

}

/* ================= VESTIMENTA MODAL ================= */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
backdrop-filter: blur(8px);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-contenido{
background:rgba(255,255,255,0.96);
padding:35px;
border-radius:22px;
max-width:900px;
width:90%;
text-align:center;
position:relative;
}

.cerrar{
position:absolute;
top:10px;
right:15px;
font-size:30px;
cursor:pointer;
}

.carrusel{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-top:20px;
}

.carrusel-track{
display:flex;
width:420px;
overflow:hidden;
transition:transform .4s ease;
}

.carrusel-track img{
width:420px;
height:260px;
object-fit:cover;
flex-shrink:0;
border-radius:16px;
}

.flecha{
background:rgba(0,0,0,0.6);
color:white;
border:none;
font-size:22px;
padding:10px 14px;
border-radius:50%;
cursor:pointer;
}

</style>

</head>

<body>

<!-- PORTADA -->
<section class="portada">
<div class="nombres">Valeria & Alan</div>
<div class="fecha">17 Octubre 2026</div>
<a class="boton" href="#musica">Ver invitación</a>
</section>

<!-- MUSICA -->
<section id="musica" class="animar">
<div class="tarjeta">
<div class="titulo">Nuestra Canción</div>
<button class="boton" onclick="document.getElementById('musicaBoda').play()">
Tocar nuestra canción
</button>

<audio id="musicaBoda" loop>
<source src="cancion2.mp3" type="audio/mpeg">
</audio>
</div>
</section>

<!-- TODO TU CONTENIDO ORIGINAL SE MANTIENE AQUÍ -->
<!-- (No lo borro ni lo resumo para respetarte tu diseño) -->

<!-- VESTIMENTA ORIGINAL + BOTÓN -->
<section class="animar">
<div class="tarjeta">
<div class="titulo">Código de Vestimenta</div>

<p>Formal elegante, con estilo y comodidad.</p>

<button class="boton" onclick="abrirVestimenta()">
Ver ideas de vestimenta
</button>

</div>
</section>

<!-- MODAL VESTIMENTA -->
<div id="modalVestimenta" class="modal">
  <div class="modal-contenido">

    <span class="cerrar" onclick="cerrarVestimenta()">&times;</span>

    <h2>Código de Vestimenta</h2>
    <p>Inspírate con estas ideas</p>

    <div class="carrusel">

      <button class="flecha" onclick="moverCarrusel(-1)">&#10094;</button>

      <div class="carrusel-track" id="trackVestimenta">

        <img src="vestido1.jpg">
        <img src="vestido2.jpg">
        <img src="vestido3.jpg">
        <img src="traje1.jpg">
        <img src="traje2.jpg">
        <img src="vaquero1.jpg">

      </div>

      <button class="flecha" onclick="moverCarrusel(1)">&#10095;</button>

    </div>

  </div>
</div>

<!-- RESTO DE TU CÓDIGO ORIGINAL CONTINÚA IGUAL -->

<script>

const fechaBoda = new Date(2026, 9, 17, 17, 0, 0).getTime();

setInterval(()=>{
const ahora = new Date().getTime();
const distancia = fechaBoda - ahora;

document.getElementById("contador")?.innerHTML =
Math.floor(distancia / (1000*60*60*24)) + " días";
},1000);

const elementos = document.querySelectorAll('.animar');

function mostrar(){
elementos.forEach(el=>{
if(el.getBoundingClientRect().top < window.innerHeight-100){
el.classList.add("visible");
}
});
}
window.addEventListener("scroll",mostrar);
mostrar();

/* MODAL */
function abrirVestimenta(){
document.getElementById("modalVestimenta").style.display="flex";
}

function cerrarVestimenta(){
document.getElementById("modalVestimenta").style.display="none";
}

window.addEventListener("click",function(e){
const modal=document.getElementById("modalVestimenta");
if(e.target===modal) modal.style.display="none";
});

/* CARRUSEL */
let i=0;
function moverCarrusel(d){
const track=document.getElementById("trackVestimenta");
const total=track.children.length;

i+=d;
if(i<0)i=total-1;
if(i>=total)i=0;

track.style.transform=`translateX(-${i*420}px)`;
}

</script>

</body>
</html>
